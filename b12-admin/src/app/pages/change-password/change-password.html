<div class="app-shell">
  <app-topbar></app-topbar>

  <div class="content-shell">
    <app-sidebar></app-sidebar>

    <main class="main">
      <div class="page-head">
        <div>
          <div class="breadcrumb">
            <a class="crumb-link" routerLink="/license-types">Accueil</a><span class="crumb-sep">›</span><span>Sécurité</span><span class="crumb-sep">›</span><span>Modifier le mot de passe</span>
          </div>
          <h1>Modifier le mot de passe</h1>
        </div>
      </div>

      <div class="table-card">
        <form class="form" (ngSubmit)="submit()">

          <!-- Mot de passe actuel -->
          <div class="row">
            <label>Mot de passe actuel *</label>

            <div class="password-field">
              <input
                [type]="showCurrent ? 'text' : 'password'"
                name="currentPassword"
                required
                placeholder="Votre mot de passe actuel"
                [(ngModel)]="currentPassword"
                [disabled]="loading"
                [class.invalid]="!!error && !currentPassword"
              />

              <button
                type="button"
                class="btn-eye"
                (click)="toggle('current')"
                [disabled]="loading"
                [attr.title]="showCurrent ? 'Masquer' : 'Afficher'"
              >
                {{ showCurrent ? 'Masquer' : 'Afficher' }}
              </button>
            </div>
          </div>

          <!-- Nouveau mot de passe -->
          <div class="row">
            <label>Nouveau mot de passe *</label>

            <div class="password-field">
              <input
                [type]="showNew ? 'text' : 'password'"
                name="newPassword"
                required
                placeholder="Minimum 8 caractères"
                [(ngModel)]="newPassword"
                [disabled]="loading"
                [class.valid]="newPassword.length > 0 && isNewPasswordValid"
                [class.invalid]="newPassword.length > 0 && !isNewPasswordValid"
              />

              <button
                type="button"
                class="btn-eye"
                (click)="toggle('new')"
                [disabled]="loading"
                [attr.title]="showNew ? 'Masquer' : 'Afficher'"
              >
                {{ showNew ? 'Masquer' : 'Afficher' }}
              </button>
            </div>

            <div *ngIf="newPassword.length > 0 && !isNewPasswordValid" class="hint hint-error">
              Minimum 8 caractères.
            </div>
            <div *ngIf="newPassword.length > 0 && isNewPasswordValid" class="hint hint-ok">
              Mot de passe valide ✅
            </div>
          </div>

          <!-- Confirmation -->
          <div class="row">
            <label>Confirmer le nouveau mot de passe *</label>

            <div class="password-field">
              <input
                [type]="showConfirm ? 'text' : 'password'"
                name="confirmPassword"
                required
                placeholder="Répétez le nouveau mot de passe"
                [(ngModel)]="confirmPassword"
                [disabled]="loading"
                [class.valid]="confirmPassword.length > 0 && passwordsMatch"
                [class.invalid]="confirmPassword.length > 0 && !passwordsMatch"
              />

              <button
                type="button"
                class="btn-eye"
                (click)="toggle('confirm')"
                [disabled]="loading"
                [attr.title]="showConfirm ? 'Masquer' : 'Afficher'"
              >
                {{ showConfirm ? 'Masquer' : 'Afficher' }}
              </button>
            </div>

            <div *ngIf="confirmPassword.length > 0 && !passwordsMatch" class="hint hint-error">
              Les mots de passe ne correspondent pas.
            </div>
            <div *ngIf="confirmPassword.length > 0 && passwordsMatch" class="hint hint-ok">
              Confirmation OK ✅
            </div>
          </div>

          <!-- Feedback -->
          <div *ngIf="error" class="error">{{ error }}</div>
          <div *ngIf="success" class="success">{{ success }}</div>

          <!-- Actions -->
          <div class="actions">
            <button type="submit" class="btn-primary" [disabled]="loading">
              {{ loading ? 'Modification...' : 'Enregistrer' }}
            </button>

            <a class="btn-secondary" routerLink="/license-types" [class.disabled]="loading">
              Annuler
            </a>
          </div>

        </form>
      </div>
    </main>
  </div>
</div>
