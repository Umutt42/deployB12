@if (dialog.visible()) {
  <div class="confirm-overlay" (click)="dialog.resolve(false)">
    <div class="confirm-card" (click)="$event.stopPropagation()">
      <h3 class="confirm-title">{{ dialog.title() }}</h3>
      <p class="confirm-message">{{ dialog.message() }}</p>
      <div class="confirm-actions">
        <button class="btn-cancel" (click)="dialog.resolve(false)">Annuler</button>
        <button
          class="btn-confirm"
          [class.btn-confirm--danger]="dialog.danger()"
          (click)="dialog.resolve(true)"
        >
          Confirmer
        </button>
      </div>
    </div>
  </div>
}
