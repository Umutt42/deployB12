<div class="msd-wrapper" [class.msd-open]="open">
  <button type="button" class="msd-trigger" (click)="toggle()">
    <span class="msd-label" [class.msd-placeholder]="selected.length === 0">{{ label }}</span>
    <svg class="msd-arrow" viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  @if (open) {
    <div class="msd-panel">
      <div class="msd-option msd-select-all" (click)="toggleAll($event)">
        <span class="msd-checkbox" [class.checked]="allSelected" [class.indeterminate]="someSelected">
          @if (allSelected) {
            <svg viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          } @else if (someSelected) {
            <svg viewBox="0 0 12 12" fill="none"><path d="M2 6H10" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
          }
        </span>
        <span class="msd-option-label">Tout sélectionner</span>
      </div>
      <div class="msd-divider"></div>
      @for (opt of options; track opt) {
        <div class="msd-option" [class.msd-selected]="isSelected(opt)" (click)="toggleOption(opt, $event)">
          <span class="msd-checkbox" [class.checked]="isSelected(opt)">
            @if (isSelected(opt)) {
              <svg viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            }
          </span>
          <span class="msd-option-label">{{ opt }}</span>
        </div>
      }
    </div>
  }
</div>
